name: Deploy Backend to Phala Cloud

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "packages/**"
      - "backend/Dockerfile"
      - "docker-compose.phala.yml"
      - "phala.toml"
      - "manifest.json"
      - "package.json"
      - "bun.lock"
      - "frontend/package.json"
      - "tsconfig.base.json"
      - "turbo.json"
      - "infra/phala-ingress/**"
      - ".github/workflows/deploy-backend-phala.yml"
  workflow_dispatch:

concurrency:
  group: tinychat-backend-phala-production
  cancel-in-progress: false

env:
  DOCKER_IMAGE: ${{ vars.TINYCHAT_BACKEND_IMAGE || 'ghcr.io/tinycloudlabs/tinychat-backend' }}
  INGRESS_IMAGE: ${{ vars.TINYCHAT_INGRESS_IMAGE || 'ghcr.io/tinycloudlabs/tinychat-backend' }}
  PHALA_CVM_ID: ${{ vars.PHALA_CVM_ID }}
  PHALA_INGRESS_DOMAIN: ${{ vars.PHALA_INGRESS_DOMAIN || 'api.tinycloud.chat' }}
  PRODUCTION_API_URL: ${{ vars.TINYCHAT_BACKEND_URL || 'https://api.tinycloud.chat' }}
  PRODUCTION_FRONTEND_URL: ${{ vars.TINYCHAT_FRONTEND_URL || 'https://tinycloud.chat' }}
  REDPILL_BASE_URL: ${{ vars.REDPILL_BASE_URL || 'https://api.redpill.ai/v1' }}
  REDPILL_DEFAULT_MODEL: ${{ vars.REDPILL_DEFAULT_MODEL || 'openai/gpt-5-mini' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production-api
      url: ${{ vars.TINYCHAT_BACKEND_URL || 'https://api.tinycloud.chat' }}
    permissions:
      contents: read
      packages: write
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish pending deployment status
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="pending" \
            -f context="tinychat-backend - phala" \
            -f description="Phala deployment started" \
            -f target_url="$TARGET_URL"

      - name: Summarize deployment target
        run: |
          {
            echo "## Phala backend deployment"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Image: \`${DOCKER_IMAGE}:${GITHUB_SHA}\`"
            echo "- CVM ID: \`${PHALA_CVM_ID}\`"
            echo "- Public API: ${PRODUCTION_API_URL}"
            echo "- Ingress domain: \`${PHALA_INGRESS_DOMAIN}\`"
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check deployment configuration
        env:
          PHALA_CVM_ID: ${{ vars.PHALA_CVM_ID }}
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          BACKEND_PRIVATE_KEY: ${{ secrets.BACKEND_PRIVATE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          REDPILL_API_KEY: ${{ secrets.REDPILL_API_KEY }}
        run: |
          missing=()
          for item in \
            PHALA_CVM_ID \
            PHALA_CLOUD_API_KEY \
            BACKEND_PRIVATE_KEY \
            CLOUDFLARE_API_TOKEN \
            CERTBOT_EMAIL \
            REDPILL_API_KEY; do
            if [ -z "${!item}" ]; then
              missing+=("$item")
              echo "::error title=Missing deployment config::$item is not configured"
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            {
              echo "### Missing deployment configuration"
              echo
              printf -- "- \`%s\`\n" "${missing[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "All required deployment config is present."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=TinyChat backend

      - name: Build and push ingress image
        id: ingress-build
        uses: docker/build-push-action@v5
        with:
          context: infra/phala-ingress
          file: infra/phala-ingress/Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ${{ env.INGRESS_IMAGE }}:ingress-${{ github.sha }}
            ${{ env.INGRESS_IMAGE }}:ingress-latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=TinyChat Phala ingress

      - name: Record pushed image
        run: |
          {
            echo
            echo "### Container image"
            echo
            echo "- Tag: \`${DOCKER_IMAGE}:${GITHUB_SHA}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Ingress tag: \`${INGRESS_IMAGE}:ingress-${GITHUB_SHA}\`"
            echo "- Ingress digest: \`${{ steps.ingress-build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pin deployed image tag
        run: |
          sed -i "s|\${TINYCHAT_BACKEND_IMAGE:-ghcr.io/tinycloudlabs/tinychat-backend:latest}|${DOCKER_IMAGE}:${GITHUB_SHA}|g" docker-compose.phala.yml
          sed -i "s|\${TINYCHAT_INGRESS_IMAGE:-ghcr.io/tinycloudlabs/tinychat-backend:ingress-latest}|${INGRESS_IMAGE}:ingress-${GITHUB_SHA}|g" docker-compose.phala.yml

      - name: Install Phala CLI
        run: |
          npm install -g phala
          phala --version || true

      - name: Capture CVM status before deploy
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          echo "::group::CVM status before deploy"
          phala cvms get "$PHALA_CVM_ID" --json \
            | jq '{id, name, status, app_id, instance_type, gateway, updated_at, created_at}'
          echo "::endgroup::"

      - name: Resolve Phala gateway CNAME
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          RAW="$(phala cvms get "$PHALA_CVM_ID" --json)"
          PHALA_GATEWAY_CNAME="$(echo "$RAW" | jq -r '.gateway.cname // empty')"
          PHALA_APP_ID="$(echo "$RAW" | jq -r '.app_id // empty')"

          if [ -z "$PHALA_GATEWAY_CNAME" ]; then
            echo "::error title=Missing Phala gateway CNAME::Could not resolve .gateway.cname for CVM ${PHALA_CVM_ID}"
            echo "$RAW" | jq '{id, name, status, app_id, gateway}'
            exit 1
          fi

          echo "PHALA_GATEWAY_CNAME=$PHALA_GATEWAY_CNAME" >> "$GITHUB_ENV"
          echo "PHALA_APP_ID=$PHALA_APP_ID" >> "$GITHUB_ENV"
          {
            echo
            echo "### Phala gateway"
            echo
            echo "- Gateway CNAME: \`$PHALA_GATEWAY_CNAME\`"
            echo "- App ID: \`$PHALA_APP_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify custom domain DNS
        run: |
          node <<'NODE'
          const dns = require("node:dns").promises;

          const domain = process.env.PHALA_INGRESS_DOMAIN;
          const expectedCname = process.env.PHALA_GATEWAY_CNAME.replace(/\.$/, "");
          const expectedTxt = `${process.env.PHALA_APP_ID}:443`;
          const txtName = `_dstack-app-address.${domain}`;

          async function main() {
            const fail = (title, message) => {
              console.error(`::error title=${title}::${message}`);
              process.exitCode = 1;
            };

            const cnameRecords = await dns.resolveCname(domain).catch(() => []);
            const txtRecords = await dns.resolveTxt(txtName).catch(() => []);
            const actualCname = cnameRecords.map((value) => value.replace(/\.$/, ""));
            const actualTxt = txtRecords.map((parts) => parts.join(""));

            console.log(`CNAME ${domain}: ${actualCname.join(", ") || "<missing>"}`);
            console.log(`TXT ${txtName}: ${actualTxt.join(", ") || "<missing>"}`);

            if (!actualCname.includes(expectedCname)) {
              fail("Phala DNS CNAME mismatch", `${domain} must CNAME to ${expectedCname}`);
            }
            if (!actualTxt.includes(expectedTxt)) {
              fail("Phala DNS TXT mismatch", `${txtName} must contain ${expectedTxt}`);
            }

            if (process.exitCode) process.exit(process.exitCode);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          {
            echo
            echo "### Custom domain DNS"
            echo
            echo "- CNAME target: \`${PHALA_GATEWAY_CNAME}\`"
            echo "- TXT target: \`${PHALA_APP_ID}:443\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Phala Cloud
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          BACKEND_PRIVATE_KEY: ${{ secrets.BACKEND_PRIVATE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          REDPILL_API_KEY: ${{ secrets.REDPILL_API_KEY }}
          # Per-user delegated agent tools (Milestone E). All three must be set
          # for the agent/tool-calling path to turn on; unset = plain chat only.
          # AGENT_DID + ELIZA_SERVICE_URL are public (repo vars); the secret is a secret.
          AGENT_DID: ${{ vars.AGENT_DID }}
          ELIZA_SERVICE_URL: ${{ vars.ELIZA_SERVICE_URL }}
          ELIZA_SERVICE_SECRET: ${{ secrets.ELIZA_SERVICE_SECRET }}
          # Paywall / billing (docs/stripe-setup.md). Each value may live as a
          # repo SECRET or a repo VARIABLE (secrets win) — all optional until
          # go-live; unset values deploy with the paywall off.
          PAYWALL_ENABLED: ${{ secrets.PAYWALL_ENABLED || vars.PAYWALL_ENABLED || 'false' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PLUS_MONTHLY: ${{ secrets.STRIPE_PRICE_PLUS_MONTHLY || vars.STRIPE_PRICE_PLUS_MONTHLY }}
          STRIPE_PRICE_PLUS_YEARLY: ${{ secrets.STRIPE_PRICE_PLUS_YEARLY || vars.STRIPE_PRICE_PLUS_YEARLY }}
          STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY || vars.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_PRO_YEARLY || vars.STRIPE_PRICE_PRO_YEARLY }}
          CREDIT_BUDGET_FREE: ${{ secrets.CREDIT_BUDGET_FREE || vars.CREDIT_BUDGET_FREE }}
          CREDIT_BUDGET_PLUS_WEEKLY: ${{ secrets.CREDIT_BUDGET_PLUS_WEEKLY || vars.CREDIT_BUDGET_PLUS_WEEKLY }}
          CREDIT_BUDGET_PRO_WEEKLY: ${{ secrets.CREDIT_BUDGET_PRO_WEEKLY || vars.CREDIT_BUDGET_PRO_WEEKLY }}
        run: |
          ENV_FILE="$RUNNER_TEMP/phala-prod.env"
          DEPLOY_RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            printf '%s\n' "BACKEND_PRIVATE_KEY=$BACKEND_PRIVATE_KEY"
            printf '%s\n' "TINYCLOUD_HOST=https://tee.node.tinycloud.xyz"
            printf '%s\n' "FRONTEND_URL=$PRODUCTION_FRONTEND_URL"
            printf '%s\n' "REDPILL_API_KEY=$REDPILL_API_KEY"
            printf '%s\n' "REDPILL_BASE_URL=$REDPILL_BASE_URL"
            printf '%s\n' "REDPILL_DEFAULT_MODEL=$REDPILL_DEFAULT_MODEL"
            printf '%s\n' "AGENT_DID=$AGENT_DID"
            printf '%s\n' "ELIZA_SERVICE_URL=$ELIZA_SERVICE_URL"
            printf '%s\n' "ELIZA_SERVICE_SECRET=$ELIZA_SERVICE_SECRET"
            printf '%s\n' "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN"
            printf '%s\n' "CERTBOT_EMAIL=$CERTBOT_EMAIL"
            printf '%s\n' "TINYCHAT_BACKEND_IMAGE=${DOCKER_IMAGE}:${GITHUB_SHA}"
            printf '%s\n' "TINYCHAT_INGRESS_IMAGE=${INGRESS_IMAGE}:ingress-$GITHUB_SHA"
            printf '%s\n' "TINYCHAT_BUILD_SHA=$GITHUB_SHA"
            printf '%s\n' "TINYCHAT_DEPLOY_RUN_URL=$DEPLOY_RUN_URL"
            printf '%s\n' "PORT=3001"
            printf '%s\n' "PHALA_INGRESS_DOMAIN=$PHALA_INGRESS_DOMAIN"
            printf '%s\n' "PHALA_GATEWAY_CNAME=$PHALA_GATEWAY_CNAME"
            printf '%s\n' "PAYWALL_ENABLED=${PAYWALL_ENABLED:-false}"
            printf '%s\n' "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY"
            printf '%s\n' "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET"
            printf '%s\n' "STRIPE_PRICE_PLUS_MONTHLY=$STRIPE_PRICE_PLUS_MONTHLY"
            printf '%s\n' "STRIPE_PRICE_PLUS_YEARLY=$STRIPE_PRICE_PLUS_YEARLY"
            printf '%s\n' "STRIPE_PRICE_PRO_MONTHLY=$STRIPE_PRICE_PRO_MONTHLY"
            printf '%s\n' "STRIPE_PRICE_PRO_YEARLY=$STRIPE_PRICE_PRO_YEARLY"
            printf '%s\n' "CREDIT_BUDGET_FREE=$CREDIT_BUDGET_FREE"
            printf '%s\n' "CREDIT_BUDGET_PLUS_WEEKLY=$CREDIT_BUDGET_PLUS_WEEKLY"
            printf '%s\n' "CREDIT_BUDGET_PRO_WEEKLY=$CREDIT_BUDGET_PRO_WEEKLY"
          } > "$ENV_FILE"

          echo "::group::Deploy environment keys"
          awk -F= '/^[A-Z0-9_]+=/ {print $1"=<set>"}' "$ENV_FILE"
          echo "::endgroup::"

          echo "Submitting Phala deploy for CVM ${PHALA_CVM_ID}..."
          # TEMPORARY: public logs enabled to debug the prod-only SSE/HTTP2 stream
          # failure. REVERT to --no-public-logs once diagnosed (TEE container logs
          # are publicly readable while this is on).
          phala deploy \
            --cvm-id "$PHALA_CVM_ID" \
            -c docker-compose.phala.yml \
            -e "$ENV_FILE" \
            --wait \
            --public-logs

      - name: Wait for CVM to report running
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          echo "Waiting for CVM to be running (up to 15 minutes)..."
          for i in {1..90}; do
            RAW=$(phala cvms get "$PHALA_CVM_ID" --json)
            STATUS=$(echo "$RAW" | jq -r '.status // "unknown"')
            NAME=$(echo "$RAW" | jq -r '.name // "unknown"')
            UPDATED_AT=$(echo "$RAW" | jq -r '.updated_at // "unknown"')
            APP_ID=$(echo "$RAW" | jq -r '.app_id // empty')
            GATEWAY_BASE_DOMAIN=$(echo "$RAW" | jq -r '.gateway.base_domain // empty')
            echo "Attempt $i/90: name='$NAME' status='$STATUS' updated_at='$UPDATED_AT'"
            if [ "$STATUS" = "running" ]; then
              echo "CVM is running."
              if [ -n "$APP_ID" ] && [ -n "$GATEWAY_BASE_DOMAIN" ]; then
                RAW_API_URL="https://${APP_ID}-3001.${GATEWAY_BASE_DOMAIN}"
                echo "PHALA_RAW_API_URL=$RAW_API_URL" >> "$GITHUB_ENV"
              fi
              {
                echo
                echo "### CVM status"
                echo
                echo "- Status: \`running\`"
                echo "- Last update: \`$UPDATED_AT\`"
                if [ -n "${RAW_API_URL:-}" ]; then
                  echo "- Raw gateway API: ${RAW_API_URL}"
                fi
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
              echo "::error title=Phala CVM failed::CVM deployment failed with status '$STATUS'"
              echo "$RAW" | jq '{id, name, status, app_id, instance_type, updated_at, created_at}'
              exit 1
            fi
            sleep 10
          done

          echo "::error title=Phala CVM timeout::Timed out waiting for CVM to become running"
          phala cvms get "$PHALA_CVM_ID" --json \
            | jq '{id, name, status, app_id, instance_type, updated_at, created_at}'
          exit 1

      - name: Verify public API
        run: |
          probe_url() {
            local label="$1"
            local url="$2"
            local body_file err_file status exit_code

            echo "Probing $label at $url"
            for i in {1..30}; do
              body_file="$(mktemp)"
              err_file="$(mktemp)"
              set +e
              status="$(curl -sS -o "$body_file" -w "%{http_code}" --connect-timeout 5 --max-time 15 "$url" 2>"$err_file")"
              exit_code=$?
              set -e

              echo "Attempt $i/30: curl_exit=$exit_code http_status=$status"
              if [ -s "$err_file" ]; then
                sed 's/^/curl: /' "$err_file"
              fi
              if [ -s "$body_file" ]; then
                echo "Response body (first 1000 bytes):"
                head -c 1000 "$body_file"
                echo
              fi

              if [ "$exit_code" -eq 0 ] && [[ "$status" =~ ^2 ]]; then
                echo "$label probe passed."
                rm -f "$body_file" "$err_file"
                return 0
              fi

              rm -f "$body_file" "$err_file"
              sleep 10
            done

            echo "::error title=Public API probe failed::$label did not return a 2xx response"
            echo "::group::Verbose curl diagnostics for $label"
            curl -v --max-time 20 "$url" || true
            echo "::endgroup::"
            return 1
          }

          HEALTH_URL="${PRODUCTION_API_URL%/}/health"
          INFO_URL="${PRODUCTION_API_URL%/}/api/server-info"
          if ! probe_url "health" "$HEALTH_URL"; then
            if [ -n "${PHALA_RAW_API_URL:-}" ]; then
              echo "::notice title=Raw Phala gateway diagnostic::Custom domain failed; probing ${PHALA_RAW_API_URL}/health"
              probe_url "raw gateway health" "${PHALA_RAW_API_URL%/}/health" || true
            fi
            exit 1
          fi

          if ! probe_url "server-info" "$INFO_URL"; then
            if [ -n "${PHALA_RAW_API_URL:-}" ]; then
              echo "::notice title=Raw Phala gateway diagnostic::Custom domain failed; probing ${PHALA_RAW_API_URL}/api/server-info"
              probe_url "raw gateway server-info" "${PHALA_RAW_API_URL%/}/api/server-info" || true
            fi
            exit 1
          fi

          {
            echo
            echo "### Public API probes"
            echo
            echo "- ${HEALTH_URL}: passed"
            echo "- ${INFO_URL}: passed"
          } >> "$GITHUB_STEP_SUMMARY"

  phala-status:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Publish Phala deployment status
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "$DEPLOY_RESULT" in
            success)
              STATE=success
              DESCRIPTION="Phala deployment and API probe succeeded"
              ;;
            cancelled)
              STATE=error
              DESCRIPTION="Phala deployment cancelled"
              ;;
            skipped)
              STATE=error
              DESCRIPTION="Phala deployment skipped"
              ;;
            *)
              STATE=failure
              DESCRIPTION="Phala deployment or API probe failed"
              ;;
          esac

          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$STATE" \
            -f context="tinychat-backend - phala" \
            -f description="$DESCRIPTION" \
            -f target_url="$TARGET_URL"
