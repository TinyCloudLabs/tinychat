openapi: 3.1.0
info:
  title: "TinyChat API"
  version: 0.1.0
  description: "API contract for the TinyChat backend."

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      security: []
      responses:
        "200":
          description: Backend is alive
          content:
            application/json:
              schema:
                type: object
                required: [ok, app]
                properties:
                  ok:
                    type: boolean
                  app:
                    type: string

  /api/manifest:
    get:
      operationId: getManifest
      summary: Runtime TinyCloud app manifest
      security: []
      responses:
        "200":
          description: Runtime manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"

  /api/server-info:
    get:
      operationId: getServerInfo
      summary: Backend delegation policy
      security: []
      responses:
        "200":
          description: Backend DID, status, policy, and policy hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"

  /api/auth/nonce:
    get:
      operationId: createNonce
      summary: Create SIWE nonce
      security: []
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
      responses:
        "200":
          description: Nonce created
          content:
            application/json:
              schema:
                type: object
                required: [nonce]
                properties:
                  nonce:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/verify:
    post:
      operationId: verifySession
      summary: Verify SIWE session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, signature]
              properties:
                message:
                  type: string
                signature:
                  type: string
      responses:
        "200":
          description: Backend session token
          content:
            application/json:
              schema:
                type: object
                required: [token, expiresIn, address]
                properties:
                  token:
                    type: string
                  expiresIn:
                    type: integer
                  address:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/delegations/status:
    get:
      operationId: getDelegationStatus
      summary: Check stored delegation status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Delegation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
              examples:
                active:
                  value:
                    status: active
                    expiresAt: "2026-05-20T12:00:00.000Z"
                expired:
                  value:
                    status: expired
                    expiresAt: "2026-05-19T12:00:00.000Z"
                stale:
                  value:
                    status: stale
                    expiresAt: null
                none:
                  value:
                    status: none
                    expiresAt: null
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/delegations:
    post:
      operationId: storeDelegation
      summary: Store and activate a portable delegation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serialized]
              properties:
                serialized:
                  type: string
      responses:
        "200":
          description: Delegation active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
    delete:
      operationId: revokeDelegation
      summary: Remove stored delegation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Delegation removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/chat:
    post:
      operationId: chat
      summary: Stream a chat completion from the RedPill LLM API
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: "Server-sent events stream (OpenAI SSE format). Each line is data: followed by JSON or [DONE]."
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/chat/models:
    get:
      operationId: getChatModels
      summary: List available LLM models from RedPill
      description: >-
        Each model is annotated with `allowed` and (when not allowed) the
        `requiredTier` for the calling user's subscription tier. When the
        paywall is disabled every model is returned with `allowed: true`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/attestation/self:
    get:
      operationId: getBackendSelfAttestation
      summary: Create a fresh backend TDX quote
      description: >-
        Returns a dstack TDX quote whose report_data is bound to the backend
        identity and caller-provided nonce. Local development environments
        without the dstack socket return attestation_unavailable.
      security:
        - bearerAuth: []
      parameters:
        - name: nonce
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9a-fA-F]{64}$"
      responses:
        "200":
          description: Fresh backend attestation quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendSelfAttestation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "503":
          description: dstack attestation is unavailable in this environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/billing/config:
    get:
      operationId: getBillingConfig
      summary: Public pricing and tier configuration
      description: >-
        Public (unauthenticated) pricing payload. Display prices are integer
        cents; the frontend divides by 100 to render dollars.
      security: []
      responses:
        "200":
          description: Paywall flag and tier list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingConfig"

  /api/billing/rates:
    get:
      operationId: getBillingRates
      summary: Public per-model credit rates
      description: >-
        Public (unauthenticated) credit-rate table. Denominated in credits only —
        no dollar/USD fields appear in this payload. Served from the shared
        RedPill catalog and mirrors `/api/chat/models`' 500/502 error contract.
      security: []
      responses:
        "200":
          description: Baseline model id and per-model rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatesResponse"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/billing/status:
    get:
      operationId: getBillingStatus
      summary: Caller's tier, usage, and subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatus"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/billing/checkout:
    post:
      operationId: createCheckout
      summary: Create a Stripe Checkout session for a paid tier
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "503":
          $ref: "#/components/responses/BillingNotConfigured"

  /api/billing/portal:
    post:
      operationId: createBillingPortal
      summary: Create a Stripe billing portal session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "503":
          $ref: "#/components/responses/BillingNotConfigured"

  /api/billing/webhook:
    post:
      operationId: stripeWebhook
      summary: Stripe webhook receiver (subscription change events)
      description: >-
        Receives Stripe events with a raw body and a `Stripe-Signature` header.
        Verified with STRIPE_WEBHOOK_SECRET. On customer.subscription.* events
        the in-memory tier cache for the affected address is invalidated.
        Stateless — no data is persisted.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Event acknowledged
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/BillingNotConfigured"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Backend session token returned by SIWE verification.

  schemas:
    ApiError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

    PaywallError:
      type: object
      required: [error, message, tier]
      properties:
        error:
          type: string
          enum: [model_not_allowed, credit_budget_exceeded]
        message:
          type: string
        tier:
          type: string
          enum: [free, plus, pro]
        requiredTier:
          type: string
          enum: [plus, pro]
          description: Present for model_not_allowed — the tier needed for the model.
        usage:
          $ref: "#/components/schemas/UsageInfo"

    Manifest:
      type: object
      required: [manifest_version, app_id, name, defaults, permissions]
      properties:
        manifest_version:
          type: integer
          const: 1
        app_id:
          type: string
        name:
          type: string
        description:
          type: string
        defaults:
          type: boolean
          const: false
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
      additionalProperties: true

    Permission:
      type: object
      required: [service, path, actions]
      properties:
        service:
          type: string
        space:
          type: string
        path:
          type: string
        actions:
          type: array
          items:
            type: string
        skipPrefix:
          type: boolean
        description:
          type: string

    ServerInfo:
      type: object
      required: [did, status, name, expiry, permissions, policyHash]
      properties:
        did:
          type: string
        status:
          type: string
        name:
          type: string
        expiry:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        policyHash:
          type: string
          pattern: "^[a-f0-9]{64}$"

    DelegationStatus:
      type: string
      enum: [active, expired, none, stale]

    DelegationResponse:
      type: object
      required: [status, expiresAt]
      properties:
        status:
          $ref: "#/components/schemas/DelegationStatus"
        expiresAt:
          type:
            - string
            - "null"
          format: date-time

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string

    ChatRequest:
      type: object
      required: [messages]
      properties:
        model:
          type: string
          description: "RedPill model ID (e.g. openai/gpt-5-mini). Defaults to REDPILL_DEFAULT_MODEL."
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"

    ModelInfo:
      type: object
      required: [id, allowed, creditsPerKInput, creditsPerKOutput, multiplier]
      properties:
        id:
          type: string
        allowed:
          type: boolean
          description: Whether the calling user's tier may call this model.
        requiredTier:
          type: string
          enum: [plus, pro]
          description: Lowest tier that can call this model, present only when not allowed.
        creditsPerKInput:
          type: number
          description: Credits charged per 1,000 input tokens (ladder-snapped; spec §2.2).
        creditsPerKOutput:
          type: number
          description: Credits charged per 1,000 output tokens (ladder-snapped; spec §2.2).
        multiplier:
          type: number
          description: Picker-badge multiplier relative to REDPILL_DEFAULT_MODEL's output rate (spec §2.4).

    ModelsResponse:
      type: object
      required: [models]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"

    BackendSelfAttestation:
      type: object
      required: [quote, event_log, report_data, identity, info]
      properties:
        quote:
          type: string
          description: TDX quote returned by the dstack guest agent.
        event_log:
          type: string
          description: Verbatim dstack event log used for RTMR replay.
        report_data:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: SHA-256(prefix || backend address || nonce), before dstack zero-padding.
        identity:
          type: object
          required: [did, address, nonce, nonce_signature]
          properties:
            did:
              type: string
            address:
              type: string
              pattern: "^0x[0-9a-fA-F]{40}$"
            nonce:
              type: string
              pattern: "^[0-9a-f]{64}$"
            nonce_signature:
              type: string
              description: EIP-191 signature over tinychat-backend-attest-v1:<nonce>.
        info:
          type: object
          required: []
          properties:
            app_id:
              type: string
            instance_id:
              type: string
            compose_hash:
              type: string
            app_compose:
              type: string
            os_image_hash:
              type: string

    TierInfo:
      type: object
      required: [id, name, priceMonthly, priceYearly, creditBudget, budgetWindow, modelPatterns]
      properties:
        id:
          type: string
          enum: [free, plus, pro]
        name:
          type: string
        priceMonthly:
          type:
            - integer
            - "null"
          description: Display price in integer cents (divide by 100 for dollars). Null for free.
        priceYearly:
          type:
            - integer
            - "null"
          description: Display price in integer cents (divide by 100 for dollars). Null for free.
        creditBudget:
          type: integer
          description: >-
            Credit allowance per budget window. Free is per UTC day; paid tiers
            are per anchored week (7 days from the subscriber's billing-cycle
            anchor). Resolved with CREDIT_BUDGET_FREE / CREDIT_BUDGET_PLUS_WEEKLY
            / CREDIT_BUDGET_PRO_WEEKLY env overrides.
        budgetWindow:
          type: string
          enum: [day, week]
        modelPatterns:
          type: array
          items:
            type: string

    RateInfo:
      type: object
      required: [id, creditsPerKInput, creditsPerKOutput, multiplier]
      properties:
        id:
          type: string
        creditsPerKInput:
          type: number
        creditsPerKOutput:
          type: number
        multiplier:
          type: number
          description: Picker-badge multiplier relative to the baseline model's output rate.

    RatesResponse:
      type: object
      required: [baseline, models]
      properties:
        baseline:
          type: string
          description: Model id used as the multiplier baseline (REDPILL_DEFAULT_MODEL).
        models:
          type: array
          items:
            $ref: "#/components/schemas/RateInfo"

    BillingConfig:
      type: object
      required: [paywallEnabled, tiers]
      properties:
        paywallEnabled:
          type: boolean
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/TierInfo"

    UsageInfo:
      type: object
      required: [used, limit, resetsAt]
      properties:
        used:
          type: integer
        limit:
          type: integer
        resetsAt:
          type: string
          format: date-time
          description: >-
            Next budget-window boundary. Free: the next UTC day boundary. Paid:
            the next anchored-week boundary (subscriber's billing-cycle anchor
            plus an integer number of 7-day periods).

    SubscriptionInfo:
      type: object
      required: [status, interval, currentPeriodEnd, anchor]
      properties:
        status:
          type: string
        interval:
          type:
            - string
            - "null"
          enum: [monthly, yearly, null]
        currentPeriodEnd:
          type:
            - string
            - "null"
          format: date-time
        anchor:
          type:
            - string
            - "null"
          format: date-time
          description: >-
            Stripe billing-cycle anchor (subscription-stable across renewals).
            Paid tiers' weekly windows are measured as 7-day periods from this
            instant. Null for free tier.

    BillingStatus:
      type: object
      required: [tier, usage, subscription]
      properties:
        tier:
          type: string
          enum: [free, plus, pro]
        usage:
          $ref: "#/components/schemas/UsageInfo"
        subscription:
          oneOf:
            - $ref: "#/components/schemas/SubscriptionInfo"
            - type: "null"

    CheckoutRequest:
      type: object
      required: [tier, interval]
      properties:
        tier:
          type: string
          enum: [plus, pro]
        interval:
          type: string
          enum: [monthly, yearly]

    CheckoutResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthenticated:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    DelegationRequired:
      description: Active delegation required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    StoreError:
      description: Delegated storage operation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    UpstreamError:
      description: Upstream LLM API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    BillingNotConfigured:
      description: Billing/Stripe is not configured on this server
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PaymentRequired:
      description: Subscription required — model not allowed or credit budget exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaywallError"
