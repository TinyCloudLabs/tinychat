openapi: 3.1.0
info:
  title: "TinyChat API"
  version: 0.1.0
  description: "API contract for the TinyChat backend."

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      security: []
      responses:
        "200":
          description: Backend is alive
          content:
            application/json:
              schema:
                type: object
                required: [ok, app]
                properties:
                  ok:
                    type: boolean
                  app:
                    type: string

  /api/manifest:
    get:
      operationId: getManifest
      summary: Runtime TinyCloud app manifest
      security: []
      responses:
        "200":
          description: Runtime manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"

  /api/server-info:
    get:
      operationId: getServerInfo
      summary: Backend delegation policy
      security: []
      responses:
        "200":
          description: Backend DID, status, policy, and policy hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"

  /api/auth/nonce:
    get:
      operationId: createNonce
      summary: Create SIWE nonce
      security: []
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
      responses:
        "200":
          description: Nonce created
          content:
            application/json:
              schema:
                type: object
                required: [nonce]
                properties:
                  nonce:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/verify:
    post:
      operationId: verifySession
      summary: Verify SIWE session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message, signature]
              properties:
                message:
                  type: string
                signature:
                  type: string
      responses:
        "200":
          description: Backend session token
          content:
            application/json:
              schema:
                type: object
                required: [token, expiresIn, address]
                properties:
                  token:
                    type: string
                  expiresIn:
                    type: integer
                  address:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/delegations/status:
    get:
      operationId: getDelegationStatus
      summary: Check stored delegation status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Delegation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
              examples:
                active:
                  value:
                    status: active
                    expiresAt: "2026-05-20T12:00:00.000Z"
                expired:
                  value:
                    status: expired
                    expiresAt: "2026-05-19T12:00:00.000Z"
                stale:
                  value:
                    status: stale
                    expiresAt: null
                none:
                  value:
                    status: none
                    expiresAt: null
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/delegations:
    post:
      operationId: storeDelegation
      summary: Store and activate a portable delegation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serialized]
              properties:
                serialized:
                  type: string
      responses:
        "200":
          description: Delegation active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
    delete:
      operationId: revokeDelegation
      summary: Remove stored delegation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Delegation removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /api/chat:
    post:
      operationId: chat
      summary: Stream a chat completion from the RedPill LLM API
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: "Server-sent events stream (OpenAI SSE format). Each line is data: followed by JSON or [DONE]."
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/UpstreamError"

  /api/chat/models:
    get:
      operationId: getChatModels
      summary: List available LLM models from RedPill
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/UpstreamError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Backend session token returned by SIWE verification.

  schemas:
    ApiError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

    Manifest:
      type: object
      required: [manifest_version, app_id, name, defaults, permissions]
      properties:
        manifest_version:
          type: integer
          const: 1
        app_id:
          type: string
        name:
          type: string
        description:
          type: string
        defaults:
          type: boolean
          const: false
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
      additionalProperties: true

    Permission:
      type: object
      required: [service, path, actions]
      properties:
        service:
          type: string
        space:
          type: string
        path:
          type: string
        actions:
          type: array
          items:
            type: string
        skipPrefix:
          type: boolean
        description:
          type: string

    ServerInfo:
      type: object
      required: [did, status, name, expiry, permissions, policyHash]
      properties:
        did:
          type: string
        status:
          type: string
        name:
          type: string
        expiry:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        policyHash:
          type: string
          pattern: "^[a-f0-9]{64}$"

    DelegationStatus:
      type: string
      enum: [active, expired, none, stale]

    DelegationResponse:
      type: object
      required: [status, expiresAt]
      properties:
        status:
          $ref: "#/components/schemas/DelegationStatus"
        expiresAt:
          type:
            - string
            - "null"
          format: date-time

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string

    ChatRequest:
      type: object
      required: [messages]
      properties:
        model:
          type: string
          description: "RedPill model ID (e.g. openai/gpt-5-mini). Defaults to REDPILL_DEFAULT_MODEL."
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"

    ModelInfo:
      type: object
      required: [id]
      properties:
        id:
          type: string

    ModelsResponse:
      type: object
      required: [models]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthenticated:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    DelegationRequired:
      description: Active delegation required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    StoreError:
      description: Delegated storage operation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    UpstreamError:
      description: Upstream LLM API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
