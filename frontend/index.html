<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230f172a'/%3E%3Cpath d='M10 8h12v16H10z' fill='%23f8fafc'/%3E%3Cpath d='M13 13h6M13 17h6M13 21h4' stroke='%230f172a' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <title>TinyCloud Chat</title>
    <script>
      (function () {
        try {
          var k = "xyz.tinycloud.tinychat:theme";
          var s = localStorage.getItem(k);
          var dark =
            s === "dark" ||
            (s !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
